<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f0ff 0%, #ffe4ec 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #c71585;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ffb6c1;
            padding-bottom: 15px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #c71585;
            font-size: 14px;
        }
        label i { margin-right: 8px; color: #ff69b4; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0e7;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 0 3px rgba(255,105,180,0.1);
        }
        .hobby-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
        }
        .hobby-group label {
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            gap: 6px;
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .hobby-group label:hover { background: #ffe0e7; }
        .hobby-group input { width: auto; margin-right: 5px; accent-color: #ff69b4; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff69b4, #c71585);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(199,21,133,0.3);
        }
        .nav-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 2px solid #ffb6c1;
        }
        .nav-links a {
            color: #c71585;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 30px;
            background: #fff5f8;
        }
        .nav-links a:hover {
            background: #ffb6c1;
            color: #c71585;
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            .container { margin: 20px; padding: 20px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-user-circle"></i> Personal Profile Form</h2>
        <div class="subtitle"><i class="fas fa-edit"></i> Fill in your details below</div>

        <form action="ProfileServlet" method="POST">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Student ID</label>
                <input type="text" name="studentId" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-graduation-cap"></i> Program</label>
                <select name="program" required>
                    <option value="">Select your program</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Software Engineering</option>
                    <option>Data Science</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" placeholder="your.email@university.edu" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-heart"></i> Hobbies</label>
                <div class="hobby-group">
                    <label><input type="checkbox" name="hobbies" value="Reading"> <i class="fas fa-book"></i> Reading</label>
                    <label><input type="checkbox" name="hobbies" value="Music"> <i class="fas fa-music"></i> Music</label>
                    <label><input type="checkbox" name="hobbies" value="Sports"> <i class="fas fa-futbol"></i> Sports</label>
                    <label><input type="checkbox" name="hobbies" value="Gaming"> <i class="fas fa-gamepad"></i> Gaming</label>
                    <label><input type="checkbox" name="hobbies" value="Coding"> <i class="fas fa-code"></i> Coding</label>
                    <label><input type="checkbox" name="hobbies" value="Travel"> <i class="fas fa-plane"></i> Travel</label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-comment"></i> Self Introduction</label>
                <textarea name="intro" rows="4" placeholder="Tell us about yourself..." required></textarea>
            </div>

            <button type="submit"><i class="fas fa-paper-plane"></i> Submit Profile</button>
        </form>

        <div class="nav-links">
            <a href="ViewProfilesServlet"><i class="fas fa-list"></i> View All Profiles</a>
            <a href="SearchProfilesServlet"><i class="fas fa-search"></i> Search Profiles</a>
        </div>
    </div>
</body>
</html>
